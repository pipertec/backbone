<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Assistant Interface</title>
    <style>
        /* Modern CSS Reset & Styling */
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2f 0%, #2d2d44 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* The main container that centers everything */
        .chat-wrapper {
            width: 90%;
            max-width: 1000px;
            height: 85vh;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Header bar for the chat window */
        .chat-header {
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #4ade80;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            box-shadow: 0 0 8px #4ade80;
        }

        /* The Frame Container */
        .iframe-container {
            flex-grow: 1;
            width: 100%;
            background: #fff; /* White background to match Mistral UI */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Mobile Adjustments */
        @media (max-width: 600px) {
            .chat-wrapper {
                width: 100%;
                height: 100vh;
                border-radius: 0;
            }
        }
    </style>
</head>
<body>

    <div class="chat-wrapper">
        <div class="chat-header">
            <div>
                <span class="status-dot"></span>
                <strong>Mistral AI Agent</strong>
            </div>
            <small style="opacity: 0.7;">Secure Connection</small>
        </div>
        
        <div class="iframe-container">
            <iframe 
                src="https://chat.mistral.ai/chat?le-chat-agent=32736c8f-0cdf-4b45-b2c3-772045cc89e3" 
                allow="clipboard-write"
                title="Mistral AI Chat">
            </iframe>
        </div>
    </div>

</body>
</html>
